<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Chatbot LLM local con Ollama</title><link rel="stylesheet" href="styles.css" /></head><body><main class="app"><section class="header"><h1>Chatbot LLM local con Ollama</h1><p>Frontend HTML/CSS/JS conectado a una API en Python que consulta un modelo local mediante Ollama.</p></section><section class="layout"><aside class="controls"><h2>Configuración</h2><label>Modelo<select id="model"><option value="llama3.2:3b">llama3.2:3b</option><option value="gemma3:4b">gemma3:4b</option><option value="qwen2.5:7b">qwen2.5:7b</option><option value="mistral:7b">mistral:7b</option></select></label><label>Temperatura<input id="temperature" type="number" min="0" max="1.2" step="0.1" value="0.7" /></label><label>Top-p<input id="top_p" type="number" min="0.1" max="1" step="0.05" value="0.9" /></label><label>Tokens máximos de salida<input id="num_predict" type="number" min="20" max="1000" step="10" value="160" /></label><label>Contexto<select id="num_ctx"><option value="2048">2048</option><option value="4096" selected>4096</option><option value="8192">8192</option></select></label><label>Repeat penalty<input id="repeat_penalty" type="number" min="1" max="2" step="0.1" value="1.1" /></label><button id="clearBtn" type="button">Limpiar conversación</button></aside><section class="chat-panel"><div id="chat" class="chat"></div><form id="chatForm" class="chat-form"><textarea id="message" rows="4" placeholder="Escribe tu mensaje para el modelo..." required></textarea><button id="sendBtn" type="submit">Enviar</button></form><section class="metrics"><h2>Métricas de la última respuesta</h2><div id="metricsGrid" class="metrics-grid"><span>Sin datos todavía</span></div></section></section></section></main><script src="app.js"></script></body></html>
